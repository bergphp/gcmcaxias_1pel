<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Copa 2026 - Todos os 72 Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary-color: #0f2027; 
            --secondary-color: #203a43; 
        }
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-bottom: 30px;
        }
        .header { 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            color: white; 
            padding: 40px 0; 
            text-align: center; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .grupo-container { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .grupo-header { 
            background: var(--secondary-color); 
            color: white; 
            margin: -15px -15px 15px -15px; 
            padding: 10px; 
            border-radius: 12px 12px 0 0; 
            font-weight: bold; 
            font-size: 1.1rem; 
            letter-spacing: 1px;
        }
        .jogo-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid #eee; 
        }
        .jogo-item:last-child { 
            border-bottom: none; 
        }
        .time-box { 
            flex: 1; 
            font-weight: 500; 
            font-size: 0.95rem; 
        }
        .text-right { 
            text-align: right; 
            padding-right: 15px;
        }
        .text-left {
            text-align: left;
            padding-left: 15px;
        }
        .placar-input { 
            width: 45px; 
            text-align: center; 
            font-weight: bold; 
            border: 2px solid #ced4da; 
            border-radius: 6px; 
            margin: 0 5px; 
            padding: 2px;
        }
        .placar-input:focus { 
            border-color: #2c5364; 
            outline: none; 
        }
        #resumo-fixed { 
            position: sticky; 
            top: 20px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-height: 85vh; 
            overflow-y: auto; 
        }
        .lista-resumo-texto {
            text-align: left;
            font-size: 0.9rem;
            color: #333;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            font-weight: bold;
        }
        .btn-whatsapp:hover {
            background-color: #1ebd54;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>SIMULADOR COPA DO MUNDO 2026</h1>
    <p class="mb-0">Todos os 72 jogos da Fase de Grupos gerados dinamicamente</p>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-lg-8" id="container-grupos"></div>

        <div class="col-lg-4">
            <div id="resumo-fixed">
                <div class="mb-3">
                    <label for="nome-usuario" class="form-label fw-bold text-dark">Nome do Participante:</label>
                    <input type="text" id="nome-usuario" class="form-control" placeholder="Digite seu nome aqui..." oninput="salvarNome()">
                </div>
                
                <hr>
                
                <h4 class="text-center mb-2 text-dark">Escolhas de <span id="resumo-nome" class="text-primary">Alguém</span></h4>
                <p class="text-muted text-center small">Conforme você preenche os placares, o resumo limpo aparece abaixo.</p>
                
                <div id="lista-resumo" class="lista-resumo-texto text-muted text-center">
                    Nenhum placar preenchido ainda.
                </div>
                
                <hr>
                <div class="d-grid gap-2">
                    <button class="btn btn-whatsapp" onclick="enviarWhatsApp()">Enviar Palpites por WhatsApp</button>
                    <button class="btn btn-outline-danger btn-sm" onclick="limparTudo()">Resetar Todos os Placares</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

        { id: "b3", t1: "Canadá", t2: "Catar" }, { id: "b4", t1: "Suíça", t2: "Bósnia" },
        { id: "b5", t1: "Bósnia", t2: "Catar" }, { id: "b6", t1: "Suíça", t2: "Canadá" }

    { grupo: "C", jogos: [

        { id: "c3", t1: "Brasil", t2: "Haiti" }, { id: "c4", t1: "Escócia", t2: "Marrocos" },
        { id: "c5", t1: "Marrocos", t2: "Haiti" }, { id: "c6", t1: "Escócia", t2: "Brasil" }
    ]},
    { grupo: "D", jogos: [
        { id: "d1", t1: "EUA", t2: "Paraguai" }, { id: "d2", t1: "Austrália", t2: "Turquia" },
        { id: "d3", t1: "EUA", t2: "Austrália" }, { id: "d4", t1: "Turquia", t2: "Paraguai" },
        { id: "d5", t1: "Paraguai", t2: "Austrália" }, { id: "d6", t1: "Turquia", t2: "EUA" }
    ]},
    { grupo: "E", jogos: [
        { id: "e1", t1: "Alemanha", t2: "Curaçau" }, { id: "e2", t1: "Costa do Marfim", t2: "Equador" },
        { id: "e3", t1: "Alemanha", t2: "Costa do Marfim" }, { id: "e4", t1: "Equador", t2: "Curaçau" },
        { id: "e5", t1: "Curaçau", t2: "Costa do Marfim" }, { id: "e6", t1: "Equador", t2: "Alemanha" }
    ]},
    { grupo: "F", jogos: [
        { id: "f1", t1: "Holanda", t2: "Japão" }, { id: "f2", t1: "Suécia", t2: "Tunísia" },
        { id: "f3", t1: "Holanda", t2: "Suécia" }, { id: "f4", t1: "Tunísia", t2: "Japão" },
        { id: "f5", t1: "Japão", t2: "Suécia" }, { id: "f6", t1: "Tunísia", t2: "Holanda" }
    ]},
    { grupo: "G", jogos: [
        { id: "g1", t1: "Bélgica", t2: "Egito" }, { id: "g2", t1: "Irã", t2: "Nova Zelândia" },
        { id: "g3", t1: "Bélgica", t2: "Irã" }, { id: "g4", t1: "Nova Zelândia", t2: "Egito" },

    ]},
    { grupo: "H", jogos: [
        { id: "h1", t1: "Espanha", t2: "Cabo Verde" }, { id: "h2", t1: "Arábia Saudita", t2: "Uruguai" },
        { id: "h3", t1: "Espanha", t2: "Arábia Saudita" }, { id: "h4", t1: "Uruguai", t2: "Cabo Verde" },
        { id: "h5", t1: "Cabo Verde", t2: "Arábia Saudita" }, { id: "h6", t1: "Uruguai", t2: "Espanha" }
    ]},
    { grupo: "I", jogos: [
        { id: "i1", t1: "França", t2: "Senegal" }, { id: "i2", t1: "Iraque", t2: "Noruega" },
        { id: "i3", t1: "França", t2: "Iraque" }, { id: "i4", t1: "Noruega", t2: "Senegal" },

        { id: "j1", t1: "Argentina", t2: "Argélia" }, { id: "j2", t1: "Áustria", t2: "Jordânia" },
        { id: "j3", t1: "Argentina", t2: "Áustria" }, { id: "j4", t1: "Jordânia", t2: "Argélia" },
        { id: "j5", t1: "Argélia", t2: "Áustria" }, { id: "j6", t1: "Jordânia", t2: "Argentina" }
    ]},
    { grupo: "K", jogos: [
        { id: "k1", t1: "Portugal", t2: "RD do Congo" }, { id: "k2", t1: "Uzbequistão", t2: "Colômbia" },
        { id: "k3", t1: "Portugal", t2: "Uzbequistão" }, { id: "k4", t1: "Colômbia", t2: "RD do Congo" },
        { id: "k5", t1: "RD do Congo", t2: "Uzbequistão" }, { id: "k6", t1: "Colômbia", t2: "Portugal" }
    ]},
    { grupo: "L", jogos: [
        { id: "l1", t1: "Inglaterra", t2: "Croácia" }, { id: "l2", t1: "Gana", t2: "Panamá" },
        { id: "l3", t1: "Inglaterra", t2: "Gana" }, { id: "l4", t1: "Panamá", t2: "Croácia" },
        { id: "l5", t1: "Croácia", t2: "Gana" }, { id: "l6", t1: "Panamá", t2: "Inglaterra" }
    ]}
];

// GERA O HTML AUTOMATICAMENTE NA TELA
function renderizarTabela() {
    const container = document.getElementById('container-grupos');
    let htmlFinal = "";

    dadosCopa.forEach(gp => {
        let htmlGrupo = `<div class="grupo-container"><div class="grupo-header text-center">GRUPO ${gp.grupo}</div>`;
        
        gp.jogos.forEach(jogo => {
            htmlGrupo += `
                <div class="jogo-item" data-id="${jogo.id}">
                    <div class="time-box text-right">${jogo.t1}</div>
                    <div class="d-flex align-items-center">
                        <input type="number" min="0" class="placar-input p1" oninput="salvarPlacar('${jogo.id}')">
                        <span class="text-muted small">X</span>
                        <input type="number" min="0" class="placar-input p2" oninput="salvarPlacar('${jogo.id}')">
                    </div>
                    <div class="time-box text-left">${jogo.t2}</div>
                </div>`;
        });
        
        htmlGrupo += `</div>`;
        htmlFinal += htmlGrupo;
    });

    container.innerHTML = htmlFinal;
    carregarPlacares();
    carregarNome();
}

function salvarNome() {
    const nomeInput = document.getElementById('nome-usuario').value;
    localStorage.setItem('copa2026_nome', nomeInput);
    document.getElementById('resumo-nome').innerText = nomeInput.trim() !== "" ? nomeInput : "Alguém";
}

function carregarNome() {
    const nomeSalvo = localStorage.getItem('copa2026_nome');
    if (nomeSalvo) {
        document.getElementById('nome-usuario').value = nomeSalvo;
        document.getElementById('resumo-nome').innerText = nomeSalvo;
    }
}

function salvarPlacar(id) {
    const linha = document.querySelector(`[data-id="${id}"]`);
    const p1 = linha.querySelector('.p1').value;
    const p2 = linha.querySelector('.p2').value;

    const resultado = { p1, p2 };
    localStorage.setItem('copa2026_' + id, JSON.stringify(resultado));
    atualizarResumo();
}

function carregarPlacares() {
    dadosCopa.forEach(gp => {
        gp.jogos.forEach(jogo => {
            const salvo = localStorage.getItem('copa2026_' + jogo.id);
            if (salvo) {
                const dados = JSON.parse(salvo);
                const linha = document.querySelector(`[data-id="${jogo.id}"]`);
                if (linha) {
                    linha.querySelector('.p1').value = dados.p1;
                    linha.querySelector('.p2').value = dados.p2;
                }
            }
        });
    });
    atualizarResumo();
}

function atualizarResumo() {
    const lista = document.getElementById('lista-resumo');
    let resumoHtml = "";
    let totalPreenchido = 0;

    dadosCopa.forEach(gp => {
        let grupoHeaderAdicionado = false;

        gp.jogos.forEach(jogo => {
            const linha = document.querySelector(`[data-id="${jogo.id}"]`);
            if (!linha) return;

            const v1 = linha.querySelector('.p1').value;
            const v2 = presidential = linha.querySelector('.p2').value;

            if (v1 !== "" || v2 !== "") {
                if (!grupoHeaderAdicionado) {
                    resumoHtml += `<div class="fw-bold text-primary mt-2 mb-1">Grupo ${gp.grupo}:</div>`;
                    grupoHeaderAdicionado = true;
                }
                resumoHtml += `<div class="mb-1 border-bottom pb-1">${jogo.t1} <b>${v1 || 0}</b> x <b>${v2 || 0}</b> ${jogo.t2}</div>`;
                totalPreenchido++;
            }
        });
    });

    if (totalPreenchido > 0) {
        lista.innerHTML = resumoHtml;
        lista.classList.remove('text-center', 'text-muted');
    } else {
        lista.innerHTML = "Nenhum placar preenchido ainda.";
        lista.classList.add('text-center', 'text-muted');
    }
}

// FUNÇÃO PARA ENVIAR OS DADOS MONTADOS PARA O WHATSAPP
function enviarWhatsApp() {
    const nome = document.getElementById('nome-usuario').value.trim() || "Anônimo";
    let textoMensagem = `*PALPITES DA COPA 2026*\n`;
    textoMensagem += `*Participante:* ${nome}\n\n`;
    
    let temPalpite = false;

    dadosCopa.forEach(gp => {
        let grupoTexto = `*Grupo ${gp.grupo}:*\n`;
        let jogoNoGrupo = false;

        gp.jogos.forEach(jogo => {
            const linha = document.querySelector(`[data-id="${jogo.id}"]`);
            if (!linha) return;

            const v1 = linha.querySelector('.p1').value;
            const v2 = linha.querySelector('.p2').value;

            if (v1 !== "" || v2 !== "") {
                grupoTexto += `• ${jogo.t1} ${v1 || 0} x ${v2 || 0} ${jogo.t2}\n`;
                jogoNoGrupo = true;
                temPalpite = true;
            }
        });

        if (jogoNoGrupo) {
            textoMensagem += grupoTexto + `\n`;
        }
    });

    if (!temPalpite) {
        alert("Preencha pelo menos um placar antes de enviar por WhatsApp!");
        return;
    }

    // Codifica o texto para o formato de URL do WhatsApp
    const urlTexto = encodeURIComponent(textoMensagem);
    
    // Abre a API do WhatsApp (funciona no PC e Celular)
    window.open(`https://api.whatsapp.com/send?text=${urlTexto}`, '_blank');
}

function limparTudo() {
    if(confirm("Tem certeza que deseja apagar o nome e todos os palpites?")) {
        localStorage.clear();
        location.reload();
    }
}

renderizarTabela();
</script>

</body>
</html>
