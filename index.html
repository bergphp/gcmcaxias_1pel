<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Copa 2026 - Fase de Grupos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #006241; --secondary-color: #ffcc00; }
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .header { background: var(--primary-color); color: white; padding: 2rem 0; margin-bottom: 2rem; border-bottom: 5px solid var(--secondary-color); }
        .nav-pills .nav-link.active { background-color: var(--primary-color); }
        .nav-link { color: #333; font-weight: bold; }
        .jogo-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .team-box { flex: 1; display: flex; align-items: center; }
        .team-right { justify-content: flex-end; text-align: right; }
        .team-name { font-weight: 600; font-size: 0.95rem; margin: 0 10px; }
        .input-placar { width: 45px; height: 40px; text-align: center; font-weight: bold; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; }
        .vs { font-weight: bold; color: #999; margin: 0 10px; }
        #resumo-container { position: sticky; top: 20px; background: white; padding: 20px; border-radius: 12px; border-top: 5px solid var(--primary-color); max-height: 80vh; overflow-y: auto; }
        .badge-grupo { background: #333; color: white; margin-bottom: 10px; display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header text-center">
    <h1>🏆 FIFA WORLD CUP 2026</h1>
    <p>Simulador da Primeira Fase (48 Seleções)</p>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <!-- ÁREA DE JOGOS -->
        <div class="col-lg-8">
            <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#rodada1">Rodada 1</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#rodada2">Rodada 2</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#rodada3">Rodada 3</button></li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="rodada1"></div>
                <div class="tab-pane fade" id="rodada2"></div>
                <div class="tab-pane fade" id="rodada3"></div>
            </div>
        </div>

        <!-- PAINEL DE VISUALIZAÇÃO -->
        <div class="col-lg-4">
            <div id="resumo-container" class="shadow">
                <h4 class="text-center">Minhas Escolhas</h4>
                <hr>
                <div id="lista-resumo">
                    <p class="text-muted text-center">Os placares aparecerão aqui conforme você preencher.</p>
                </div>
                <button class="btn btn-danger btn-sm w-100 mt-3" onclick="limparTudo()">Limpar Tudo</button>
            </div>
        </div>
    </div>
</div>

<script>
// Dados oficiais simplificados para o exemplo (Grupos A a L)
const grupos = [
    { nome: 'A', times: ['México', 'África do Sul', 'Coreia do Sul', 'Tchéquia'] },
    { nome: 'B', times: ['Canadá', 'Bósnia e H.', 'Catar', 'Suíça'] },
    { nome: 'C', times: ['Brasil', 'Marrocos', 'Haiti', 'Escócia'] },
    { nome: 'D', times: ['EUA', 'Paraguai', 'Austrália', 'Turquia'] },
    { nome: 'E', times: ['Alemanha', 'Curaçau', 'Costa do Marfim', 'Equador'] },
    { nome: 'F', times: ['Holanda', 'Japão', 'Suécia', 'Tunísia'] },
    { nome: 'G', times: ['Bélgica', 'Egito', 'Irã', 'Nova Zelândia'] },
    { nome: 'H', times: ['Espanha', 'Cabo Verde', 'Arábia Saudita', 'Uruguai'] },
    { nome: 'I', times: ['França', 'Senegal', 'Iraque', 'Noruega'] },
    { nome: 'J', times: ['Argentina', 'Argélia', 'Áustria', 'Jordânia'] },
    { nome: 'K', times: ['Portugal', 'RD Congo', 'Uzbequistão', 'Colômbia'] },
    { nome: 'L', times: ['Inglaterra', 'Croácia', 'Gana', 'Panamá'] }
];

function gerarJogos() {
    const r1 = document.getElementById('rodada1');
    const r2 = document.getElementById('rodada2');
    const r3 = document.getElementById('rodada3');

    grupos.forEach(g => {
        // Rodada 1: Time 1 x Time 2 | Time 3 x Time 4
        r1.innerHTML += criarTemplateJogo(g.nome, g.times[0], g.times[1], `R1-${g.nome}-J1`);
        r1.innerHTML += criarTemplateJogo(g.nome, g.times[2], g.times[3], `R1-${g.nome}-J2`);
        // Rodada 2: Time 1 x Time 3 | Time 2 x Time 4
        r2.innerHTML += criarTemplateJogo(g.nome, g.times[0], g.times[2], `R2-${g.nome}-J1`);
        r2.innerHTML += criarTemplateJogo(g.nome, g.times[1], g.times[3], `R2-${g.nome}-J2`);
        // Rodada 3: Time 4 x Time 1 | Time 2 x Time 3
        r3.innerHTML += criarTemplateJogo(g.nome, g.times[3], g.times[0], `R3-${g.nome}-J1`);
        r3.innerHTML += criarTemplateJogo(g.nome, g.times[1], g.times[2], `R3-${g.nome}-J2`);
    });
}

function criarTemplateJogo(grupo, t1, t2, id) {
    return `
        <div class="jogo-card" data-id="${id}">
            <div class="team-box team-right">
                <span class="badge-grupo d-block d-md-none">Grupo ${grupo}</span>
                <span class="team-name">${t1}</span>
                <input type="number" min="0" class="input-placar placar-h" oninput="salvar('${id}')">
            </div>
            <span class="vs">X</span>
            <div class="team-box">
                <input type="number" min="0" class="input-placar placar-a" oninput="salvar('${id}')">
                <span class="team-name">${t2}</span>
            </div>
        </div>
    `;
}

function salvar(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    const h = card.querySelector('.placar-h').value;
    const a = card.querySelector('.placar-a').value;
    localStorage.setItem(id, JSON.stringify({h, a}));
    atualizarResumo();
}

function atualizarResumo() {
    const lista = document.getElementById('lista-resumo');
    const cards = document.querySelectorAll('.jogo-card');
    let html = "";
    
    cards.forEach(card => {
        const id = card.getAttribute('data-id');
        const h = card.querySelector('.placar-h').value;
        const a = card.querySelector('.placar-a').value;
        const t1 = card.querySelectorAll('.team-name')[0].innerText;
        const t2 = card.querySelectorAll('.team-name')[1].innerText;

        if (h !== "" || a !== "") {
            html += `<div class="small border-bottom py-1"><b>${t1}</b> ${h||0} x ${a||0} <b>${t2}</b></div>`;
        }
    });

    lista.innerHTML = html || '<p class="text-muted text-center">Nenhum placar preenchido.</p>';
}

function carregar() {
    document.querySelectorAll('.jogo-card').forEach(card => {
        const id = card.getAttribute('data-id');
        const salvo = localStorage.getItem(id);
        if (salvo) {
            const dados = JSON.parse(salvo);
            card.querySelector('.placar-h').value = dados.h;
            card.querySelector('.placar-a').value = dados.a;
        }
    });
    atualizarResumo();
}

function limparTudo() {
    if(confirm("Deseja apagar todos os palpites?")) {
        localStorage.clear();
        location.reload();
    }
}

gerarJogos();
carregar();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
